<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>御坂网络 · 节点统计</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a0f;
    color: #e6edf3;
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
  }
  
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }
  
  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  
  .header-icon { font-size: 48px; display: block; margin-bottom: 8px; }
  .header-title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #f0f6fc;
    margin-bottom: 4px;
  }
  .header-sub {
    font-size: 13px;
    color: #58a6ff;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 700;
  }
  
  /* Stats Cards */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 40px;
  }
  
  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
  }
  
  .stat-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: #58a6ff;
    margin-bottom: 4px;
  }
  
  .stat-label {
    font-size: 13px;
    color: #8b949e;
  }
  
  .stat-label .highlight {
    color: #f0c040;
  }
  
  /* Latest User */
  .latest-section {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  
  .latest-avatar {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    border: 2px solid rgba(88, 166, 255, 0.2);
    image-rendering: pixelated;
    flex-shrink: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  
  .latest-avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  
  .latest-info h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  
  .latest-info p {
    font-size: 13px;
    color: #8b949e;
  }
  
  /* Avatar Wall */
  .wall-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  
  .wall-header h2 {
    font-size: 16px;
    font-weight: 700;
    color: #f0f6fc;
  }
  
  .wall-controls {
    display: flex;
    gap: 8px;
  }
  
  .wall-controls button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #8b949e;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.15s;
  }
  
  .wall-controls button:hover {
    background: rgba(88, 166, 255, 0.1);
    border-color: rgba(88, 166, 255, 0.3);
    color: #58a6ff;
  }
  
  .wall-controls button.active {
    background: rgba(88, 166, 255, 0.15);
    border-color: #58a6ff;
    color: #58a6ff;
  }
  
  .avatar-wall {
    display: grid;
    gap: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 20px;
    min-height: 200px;
    position: relative;
  }
  
  .avatar-wall.loading::after {
    content: '加载中...';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #484f58;
    font-size: 14px;
  }
  
  .avatar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px;
    border-radius: 10px;
    transition: background 0.15s;
    cursor: default;
  }
  
  .avatar-item:hover {
    background: rgba(255,255,255,0.04);
  }
  
  .avatar-item img {
    width: 64px;
    height: 64px;
    border-radius: 8px;
    image-rendering: pixelated;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.2);
  }
  
  .avatar-item .name {
    font-size: 10px;
    color: #484f58;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  
  /* Grid modes */
  .avatar-wall.s { grid-template-columns: repeat(10, 1fr); }
  .avatar-wall.m { grid-template-columns: repeat(7, 1fr); }
  .avatar-wall.l { grid-template-columns: repeat(5, 1fr); }
  
  .avatar-wall.s .avatar-item img { width: 48px; height: 48px; }
  .avatar-wall.m .avatar-item img { width: 64px; height: 64px; }
  .avatar-wall.l .avatar-item img { width: 80px; height: 80px; }
  
  .avatar-wall.s .avatar-item .name { display: none; }
  
  /* Footer */
  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11px;
    color: #30363d;
  }
  
  .footer a {
    color: #484f58;
    text-decoration: none;
  }
  
  .footer a:hover {
    color: #58a6ff;
  }
  
  /* Error state */
  .error-msg {
    text-align: center;
    padding: 40px;
    color: #f85149;
    font-size: 14px;
  }
  
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr; }
    .avatar-wall.s { grid-template-columns: repeat(5, 1fr); }
    .avatar-wall.m { grid-template-columns: repeat(4, 1fr); }
    .avatar-wall.l { grid-template-columns: repeat(3, 1fr); }
    .latest-section { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <span class="header-icon">🧠</span>
    <div class="header-title">御坂网络</div>
    <div class="header-sub">Node Statistics · 节点统计</div>
  </div>
  
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="totalNodes">—</div>
      <div class="stat-label">已注册节点</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="latestNode">—</div>
      <div class="stat-label">最新节点</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="uniqueColors">—</div>
      <div class="stat-label">领巾色种</div>
    </div>
  </div>
  
  <div class="latest-section" id="latestSection">
    <div class="latest-avatar" id="latestAvatar">
      <span style="color:#484f58;font-size:12px;">?</span>
    </div>
    <div class="latest-info">
      <h3 id="latestName">加载中...</h3>
      <p id="latestDesc">御坂网络最新加入节点</p>
    </div>
  </div>
  
  <div class="wall-header">
    <h2>节点头像墙</h2>
    <div class="wall-controls">
      <button class="active" data-size="s" onclick="setGridSize('s')">小</button>
      <button data-size="m" onclick="setGridSize('m')">中</button>
      <button data-size="l" onclick="setGridSize('l')">大</button>
    </div>
  </div>
  
  <div class="avatar-wall s loading" id="avatarWall">
    <!-- Avatars rendered here -->
  </div>
  
  <div class="footer">
    <a href="https://github.com/Ikalus1988/MisakaNet">github.com/Ikalus1988/MisakaNet</a>
    &nbsp;·&nbsp; 御坂网络 (MisakaNet) · Apache 2.0
  </div>
</div>

<script>
const START_NUM = 10000;
const BASE_URL = 'https://raw.githubusercontent.com/Ikalus1988/MisakaNet/main';
const GITHUB_API = 'https://api.github.com/repos/Ikalus1988/MisakaNet';
const AVATAR_URL = `${BASE_URL}/avatars`;

let currentMax = START_NUM;
let loading = false;

async function fetchCounter() {
  const resp = await fetch(`${BASE_URL}/counter.json`);
  const data = await resp.json();
  return data.current;
}

async function getLatestRegistration() {
  try {
    const resp = await fetch(
      `${GITHUB_API}/issues?labels=registration&state=all&sort=created&direction=desc&per_page=1`,
      { headers: { Accept: 'application/vnd.github.v3+json' } }
    );
    const issues = await resp.json();
    if (issues.length > 0) {
      return {
        number: issues[0].number,
        created_at: issues[0].created_at,
        html_url: issues[0].html_url,
      };
    }
  } catch (e) {
    // Fallback: just use counter
  }
  return null;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function loadStats() {
  try {
    currentMax = await fetchCounter();
    const count = currentMax - START_NUM;
    
    document.getElementById('totalNodes').textContent = count;
    document.getElementById('latestNode').textContent = `Misaka${currentMax}`;
    document.getElementById('uniqueColors').textContent = '12';
    
    // Latest avatar
    const latestAvatarDiv = document.getElementById('latestAvatar');
    latestAvatarDiv.innerHTML = `<img src="${AVATAR_URL}/Misaka${currentMax.toString().padStart(5,'0')}.png" alt="Misaka${currentMax}" onerror="this.parentElement.innerHTML='<span style=color:#484f58;font-size:20px;>?</span>'">`;
    document.getElementById('latestName').textContent = `Misaka${currentMax}`;
    
    // Latest issue info
    const issue = await getLatestRegistration();
    if (issue) {
      document.getElementById('latestDesc').innerHTML = 
        `加入于 ${formatDate(issue.created_at)} · ` +
        `<a href="${issue.html_url}" style="color:#58a6ff;text-decoration:none;">查看注册信息</a>`;
    }
    
    // Load avatar wall
    loadAvatarWall(count);
    
  } catch (e) {
    document.getElementById('avatarWall').innerHTML = 
      `<div class="error-msg">❌ 加载失败: ${e.message}</div>`;
    document.getElementById('totalNodes').textContent = '?';
  }
}

function loadAvatarWall(count) {
  const wall = document.getElementById('avatarWall');
  wall.classList.add('loading');
  wall.innerHTML = '';
  
  // Load in batches for performance
  const batchSize = 20;
  let loaded = 0;
  
  function loadBatch() {
    const fragment = document.createDocumentFragment();
    const end = Math.min(loaded + batchSize, count);
    
    for (let i = loaded; i < end; i++) {
      const num = START_NUM + 1 + i;
      const name = `Misaka${num.toString().padStart(5, '0')}`;
      const item = document.createElement('div');
      item.className = 'avatar-item';
      item.innerHTML = `
        <img src="${AVATAR_URL}/${name}.png" alt="${name}" loading="lazy" onerror="this.style.display='none'">
        <span class="name">${name}</span>
      `;
      fragment.appendChild(item);
    }
    
    wall.appendChild(fragment);
    loaded = end;
    
    if (loaded < count) {
      setTimeout(loadBatch, 50);
    } else {
      wall.classList.remove('loading');
    }
  }
  
  loadBatch();
}

function setGridSize(size) {
  const wall = document.getElementById('avatarWall');
  wall.className = `avatar-wall ${size}`;
  
  document.querySelectorAll('.wall-controls button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.size === size);
  });
}

// Start
loadStats();
</script>

</body>
</html>
